# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
---
name: Go

on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - "v*.*.*"

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # Extract content between this version header and the next version header
          CHANGELOG=$(awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## \\[v[0-9]/{flag=0} flag" CHANGELOG.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: >-
          CGO_ENABLED=0
          go build
          -v
          -ldflags "-X main.version=${GITHUB_REF_NAME}"
          -o mariadb-lastlogin
          ./cmd/mariadb-lastlogin

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: mariadb-lastlogin
